name: Deploy Demo to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'demo/**'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: demo/package-lock.json

      - name: Install dependencies
        working-directory: demo
        run: npm ci

      - name: Build
        working-directory: demo
        # CMS credentials are stored as GitHub Actions Secrets.
        # Go to: Settings → Secrets and variables → Actions → New repository secret
        # Required secrets: VITE_CMS_BASE_URL, VITE_CMS_PROJECT, VITE_CMS_MODEL
        # Optional:         VITE_CMS_TOKEN  (enables write operations from the form)
        # If secrets are absent the app runs in demo-only mode (mock data).
        env:
          VITE_CMS_BASE_URL: ${{ secrets.VITE_CMS_BASE_URL }}
          VITE_CMS_PROJECT:  ${{ secrets.VITE_CMS_PROJECT }}
          VITE_CMS_MODEL:    ${{ secrets.VITE_CMS_MODEL }}
          VITE_CMS_TOKEN:    ${{ secrets.VITE_CMS_TOKEN }}
        run: npm run build

      - name: Prepare Pages structure
        run: |
          mkdir -p _site/demo
          cp -r demo/dist/* _site/demo/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
